<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema Telejur</title>
    <style>
        :root { --primary: #25d366; --telecom: #007bff; --bg: #f0f2f5; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .container { max-width: 500px; background: var(--white); padding: 25px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); margin: auto; }
        #menuPrincipal { text-align: center; }
        .btn-menu { width: 100%; padding: 20px; margin: 10px 0; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: 700; cursor: pointer; color: white; }
        .btn-cftv { background: var(--primary); }
        .btn-telecom { background: var(--telecom); }
        #formContainer { display: none; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .badge-container { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
        .badge { background: #e7f3ff; color: #1877f2; padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .btn-enviar { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 10px; width: 100%; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .telecom-theme .btn-enviar { background: var(--telecom); }
    </style>
</head>
<body>

<div class="container">
    <div id="menuPrincipal">
        <h2>Selecione a Equipe</h2>
        <button class="btn-menu btn-cftv" onclick="abrirForm('CFTV')">EQUIPE CFTV</button>
        <button class="btn-menu btn-telecom" onclick="abrirForm('TELECOM')">EQUIPE TELECOM</button>
    </div>

    <div id="formContainer">
        <h2 id="tituloForm">Relatório</h2>
        <form id="mainForm">
            <div class="form-group">
                <label>Atividade:</label>
                <input type="text" id="atividade" required>
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex:1"><label>Data:</label><input type="text" id="data_auto" readonly></div>
                <div class="form-group" style="flex:1"><label>Hora:</label><input type="text" id="hora_auto" readonly></div>
            </div>
            <div class="form-group">
                <label>Nº Chamado:</label>
                <input type="text" id="chamado" required>
            </div>
            <div class="form-group">
                <label>Adicionar Colaborador:</label>
                <select id="selectColaboradores" onchange="addTecnico()"></select>
                <div class="badge-container" id="badgesEquipe"></div>
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex:1"><label>Site:</label><select id="site"><option value="JPO">JPO</option><option value="JBE">JBE</option></select></div>
                <div class="form-group" style="flex:1"><label>Local:</label><input type="text" id="local" required></div>
            </div>
            <div class="form-group">
                <label>Utilização SkyMunck:</label>
                <select id="skymunck"><option value="Não">Não</option><option value="Sim">Sim</option></select>
            </div>
            <div class="form-group">
                <label>Status:</label>
                <select id="status"><option value="Concluído">Concluído</option><option value="Pendente">Pendente</option><option value="Em Andamento">Em Andamento</option></select>
            </div>
            <div class="form-group">
                <label>Comentários:</label>
                <textarea id="comentarios" rows="2"></textarea>
            </div>
            <button type="button" class="btn-enviar" onclick="enviarRelatorio()">ENVIAR RELATÓRIO</button>
            <button type="button" onclick="location.reload()" style="width:100%; background:none; border:none; color:gray; margin-top:10px; cursor:pointer;">Voltar ao Menu</button>
        </form>
    </div>
</div>

<script>
    const URL_SHEETS = "https://script.google.com/macros/s/AKfycbznxOMvEwie2epxU9xOw4Wzudc6n-skaGv4E34A37FWSXFtZu2ckhvP5zFkh1Vv3WWE/exec";
    
    // Listas baseadas no histórico do usuário
    const listas = {
        'CFTV': ["Joelcinei Guimarães", "Edenildo Rodrigues", "Reginaldo Pereira", "Matheus Costa", "Juenisson Belem"],
        'TELECOM': ["Deivison Aleidson", "Walter", "Lafaiete Batista", "Reginaldo Pereira", "Francivaldo", "Joelcinei Guimarães"]
    };

    let equipeAtual = '';
    let selecionados = [];

    function abrirForm(tipo) {
        equipeAtual = tipo;
        document.getElementById('menuPrincipal').style.display = 'none';
        document.getElementById('formContainer').style.display = 'block';
        document.getElementById('tituloForm').innerText = "Relatório " + tipo;
        document.body.className = tipo === 'TELECOM' ? 'telecom-theme' : '';
        
        const sel = document.getElementById('selectColaboradores');
        sel.innerHTML = '<option value="">Selecione...</option>' + listas[tipo].map(n => `<option value="${n}">${n}</option>`).join('');
        
        const agora = new Date();
        document.getElementById('data_auto').value = agora.toLocaleDateString('pt-BR');
        document.getElementById('hora_auto').value = agora.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
    }

    function addTecnico() {
        const val = document.getElementById('selectColaboradores').value;
        if (val && !selecionados.includes(val)) {
            selecionados.push(val);
            renderBadges();
        }
    }

    function renderBadges() {
        document.getElementById('badgesEquipe').innerHTML = selecionados.map(n => `<div class="badge">${n}</div>`).join('');
    }

    async function enviarRelatorio() {
        if (selecionados.length === 0) return alert("Selecione a equipe!");
        
        const d = {
            tipo: equipeAtual,
            atividade: document.getElementById('atividade').value,
            data: document.getElementById('data_auto').value,
            hora: document.getElementById('hora_auto').value,
            chamado: document.getElementById('chamado').value.toUpperCase(),
            equipe: selecionados.join('\n'), // Quebra de linha simples para a planilha
            site: document.getElementById('site').value,
            local: document.getElementById('local').value,
            skymunck: document.getElementById('skymunck').value,
            status: document.getElementById('status').value,
            obs: document.getElementById('comentarios').value || "Nenhuma observação."
        };

        // Envio para Planilha
        fetch(URL_SHEETS, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });

        // Formatação WhatsApp (Exatamente como solicitado)
        const divisor = "----------------------------------------";
        const equipeWhats = selecionados.join('%0A'); // Codificação correta para o WhatsApp pular linha
        
        const msg = `*RELATÓRIO DE MANUTENÇÃO ${d.tipo}*%0A${divisor}%0A%0A` +
                    `*Atividade:*%0A${d.atividade}%0A${divisor}%0A` +
                    `*Data:*%0A${d.data}%0A${divisor}%0A` +
                    `*Hora:*%0A${d.hora}%0A${divisor}%0A` +
                    `*Nº Chamado:*%0A${d.chamado}%0A${divisor}%0A` +
                    `*Colaboradores:*%0A${equipeWhats}%0A${divisor}%0A` +
                    `*Site:*%0A${d.site}%0A${divisor}%0A` +
                    `*Local:*%0A${d.local}%0A${divisor}%0A` +
                    `*Utilização SkyMunck:*%0A${d.skymunck}%0A${divisor}%0A` +
                    `*Status:*%0A${d.status}%0A${divisor}%0A` +
                    `*Comentários:*%0A${d.obs}%0A${divisor}`;

        window.open(`https://api.whatsapp.com/send?text=${msg}`, '_blank');
        setTimeout(() => location.reload(), 1000);
    }
</script>
</body>
</html>
