<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Relatório Técnico - Telejur</title>
    <style>
        :root { --primary: #0056b3; --admin: #2c3e50; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .container { max-width: 500px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin: auto; }
        h2 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .colab-list { background: #eee; padding: 10px; border-radius: 8px; max-height: 150px; overflow-y: auto; }
        .colab-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 0.9rem; }
        .colab-item input { width: auto; margin-right: 10px; transform: scale(1.3); }
        button { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Painel Admin */
        .admin-section { margin-top: 30px; border-top: 2px dashed #ccc; padding-top: 20px; display: none; }
        .admin-btn { background: var(--admin); font-size: 0.8rem; padding: 8px; margin-top: 20px; }
        .badge-admin { background: #eee; color: #666; text-align: center; font-size: 0.7rem; cursor: pointer; margin-top: 40px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Manutenção e Atividades</h2>
    
    <form action="https://formspree.io/f/seu-id-aqui" method="POST" id="mainForm">
        
        <div class="form-group">
            <label>Atividade:</label>
            <input type="text" name="atividade" placeholder="Ex: Manutenção CFTV" required>
        </div>

        <div class="form-group">
            <label>Data e Hora (Automático):</label>
            <input type="text" name="data_hora" id="data_hora" readonly>
        </div>

        <div class="form-group">
            <label>Nº Chamado:</label>
            <input type="text" name="chamado" placeholder="0000/2026">
        </div>

        <div class="form-group">
            <label>Colaboradores (Selecione um ou mais):</label>
            <div class="colab-list" id="listaColaboradores">
                <!-- Nomes gerados via JS -->
            </div>
            <!-- Campo oculto para enviar os nomes selecionados ao Formspree -->
            <input type="hidden" name="colaboradores_selecionados" id="colabFinal">
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex:1">
                <label>Site:</label>
                <input type="text" name="site" required>
            </div>
            <div class="form-group" style="flex:1">
                <label>Local:</label>
                <input type="text" name="local">
            </div>
        </div>

        <div class="form-group">
            <label>Utilização do SkyMunck:</label>
            <select name="skymunck">
                <option value="Não Utilizado">Não Utilizado</option>
                <option value="Utilizado">Utilizado</option>
            </select>
        </div>

        <div class="form-group">
            <label>Status Final:</label>
            <select name="status">
                <option value="Concluído">✅ Concluído</option>
                <option value="Pendente">⚠️ Pendente</option>
                <option value="Em Andamento">⏳ Em Andamento</option>
            </select>
        </div>

        <button type="submit" onclick="prepararEnvio()">Enviar Relatório</button>
    </form>

    <div class="badge-admin" onclick="toggleAdmin()">⚙️ Painel de Colaboradores</div>

    <div class="admin-section" id="adminPanel">
        <label>Adicionar Novo Colaborador:</label>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="novoNome" placeholder="Nome completo">
            <button class="admin-btn" style="width: 80px; margin: 0;" onclick="addColaborador()">Add</button>
        </div>
        <p style="font-size: 0.7rem; color: #666;">*As alterações ficam salvas neste navegador.</p>
    </div>
</div>

<script>
    // Lista inicial (Baseada na sua solicitação)
    let colaboradores = [
        "Edenildo Rodrigues", "Joelcinei Guimarães", "Matheus Costa", 
        "Juenisson Belem", "Cezar Prado", "Ezequiel Silva", "Lucas Anjos"
    ];

    // Carregar dados salvos ou usar lista padrão
    if (localStorage.getItem('listaTecnicos')) {
        colaboradores = JSON.parse(localStorage.getItem('listaTecnicos'));
    }

    function renderizarColaboradores() {
        const div = document.getElementById('listaColaboradores');
        div.innerHTML = '';
        colaboradores.forEach((nome, index) => {
            div.innerHTML += `
                <div class="colab-item">
                    <input type="checkbox" value="${nome}" class="check-colab"> ${nome}
                </div>`;
        });
    }

    function addColaborador() {
        const nome = document.getElementById('novoNome').value;
        if (nome) {
            colaboradores.push(nome);
            localStorage.setItem('listaTecnicos', JSON.stringify(colaboradores));
            renderizarColaboradores();
            document.getElementById('novoNome').value = '';
        }
    }

    function toggleAdmin() {
        const panel = document.getElementById('adminPanel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function atualizarDataHora() {
        const agora = new Date();
        const dataFormatada = agora.toLocaleDateString('pt-BR') + ' às ' + agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        document.getElementById('data_hora').value = dataFormatada;
    }

    function prepararEnvio() {
        // Pega todos os checkboxes marcados e joga no campo oculto
        const selecionados = Array.from(document.querySelectorAll('.check-colab:checked')).map(cb => cb.value);
        document.getElementById('colabFinal').value = selecionados.join(', ');
    }

    // Inicialização
    atualizarDataHora();
    renderizarColaboradores();
</script>

</body>
</html>
