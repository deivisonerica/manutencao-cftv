<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manutenção CFTV - Telejur</title>
    <style>
        :root { 
            --primary: #25d366; 
            --primary-dark: #128c7e;
            --danger: #ff4d4d; 
            --bg: #f0f2f5; 
            --text: #1c1e21; 
            --white: #ffffff;
            --gray-light: #f5f6f7;
        }
        
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .container { max-width: 500px; background: var(--white); padding: 25px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); margin: auto; }
        
        h2 { color: var(--primary-dark); text-align: center; margin-bottom: 25px; font-weight: 700; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85rem; color: #606770; }
        
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1.5px solid #dddfe2; border-radius: 10px; 
            font-size: 16px; box-sizing: border-box; transition: border-color 0.2s;
        }
        input:focus { border-color: var(--primary); outline: none; }
        input:invalid { border-color: var(--danger); }

        .equipe-badge-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .badge { 
            background: #e7f3ff; color: #1877f2; padding: 6px 14px; border-radius: 50px; 
            font-size: 0.85rem; display: flex; align-items: center; font-weight: 600; 
        }
        .badge span { margin-left: 8px; cursor: pointer; color: #1877f2; font-size: 1.2rem; }

        .btn-whatsapp { 
            background: var(--primary); color: white; border: none; padding: 16px; border-radius: 10px; 
            width: 100%; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 15px;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: var(--white); width: 90%; max-width: 400px; padding: 20px;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .add-box { display: flex; gap: 8px; margin-bottom: 20px; }
        .colab-list { max-height: 250px; overflow-y: auto; }
        .colab-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; background: var(--gray-light); border-radius: 10px;
            margin-bottom: 8px; font-size: 0.95rem; font-weight: 500;
        }
        .btn-del { color: var(--danger); background: none; border: none; cursor: pointer; font-weight: bold; }

        .btn-admin-open { 
            background: none; color: #8a8d91; font-size: 0.85rem; border: none; 
            margin: 25px auto 0; display: block; cursor: pointer; text-decoration: underline; 
        }

        option:disabled { color: #bcc0c4; }
    </style>
</head>
<body>

<div class="container">
    <h2>Manutenção CFTV</h2>
    
    <form id="cftvForm">
        <div class="form-group">
            <label>Atividade:</label>
            <input type="text" id="atividade" placeholder="Ex: Limpeza de camera" required>
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex:1">
                <label>Data:</label>
                <input type="text" id="data_auto" readonly required>
            </div>
            <div class="form-group" style="flex:1">
                <label>Hora:</label>
                <input type="text" id="hora_auto" readonly required>
            </div>
        </div>

        <div class="form-group">
            <label>Nº Chamado:</label>
            <!-- Regex atualizada para [iI][nN][cC] e [sS][cC][tT][aA][sS][kK] -->
            <input type="text" id="chamado" placeholder="Ex: inc1234567" 
                   pattern="^([iI][nN][cC]\d{7}|[sS][cC][tT][aA][sS][kK]\d{7})$" 
                   title="Inicie com INC ou SCTASK (maiúsculo ou minúsculo) + 7 números." required>
        </div>

        <div class="form-group">
            <label>Equipe Técnica (Mínimo 1):</label>
            <select id="selectColaboradores" onchange="adicionarColaborador()">
                <option value="">Selecione para adicionar...</option>
            </select>
            <div class="equipe-badge-container" id="badgesEquipe"></div>
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex:1">
                <label>Site:</label>
                <select id="site" required>
                    <option value="">Selecione...</option>
                    <option value="JPO">JPO</option>
                    <option value="JBE">JBE</option>
                </select>
            </div>
            <div class="form-group" style="flex:1">
                <label>Local:</label>
                <input type="text" id="local" placeholder="Ex: Portaria" required>
            </div>
        </div>

        <div class="form-group">
            <label>Status:</label>
            <select id="status" required>
                <option value="">Selecione o estado...</option>
                <option value="Concluído">✅ Concluído</option>
                <option value="Pendente">⚠️ Pendente</option>
                <option value="Em Andamento">⏳ Em Andamento</option>
            </select>
        </div>

        <div class="form-group">
            <label>Comentários:</label>
            <textarea id="comentarios" rows="3" placeholder="Observações importantes..." required></textarea>
        </div>

        <button type="button" class="btn-whatsapp" onclick="enviarWhatsApp()">
            ENVIAR RELATÓRIO
        </button>
    </form>

    <button class="btn-admin-open" onclick="toggleModal(true)">⚙️ Gerenciar Nomes da Equipe</button>
</div>

<div class="modal-overlay" id="modalEquipe">
    <div class="modal-content">
        <div class="admin-header">
            <h3>Gerenciar Equipe</h3>
            <button onclick="toggleModal(false)" style="background:none; border:none; font-size: 1.5rem; cursor:pointer;">&times;</button>
        </div>
        
        <div class="add-box">
            <input type="text" id="novoNome" placeholder="Nome do colaborador">
            <button onclick="addNovoColab()" style="background: var(--primary-dark); color: white; border: none; padding: 0 15px; border-radius: 8px; font-weight: bold; cursor: pointer;">ADD</button>
        </div>

        <div class="colab-list" id="listaAdminColaboradores"></div>

        <button onclick="toggleModal(false)" style="width: 100%; padding: 12px; margin-top: 15px; border: none; border-radius: 10px; background: #eee; font-weight: 600; cursor: pointer;">Concluir</button>
    </div>
</div>

<script>
    let colaboradores = ["Edenildo Rodrigues", "Joelcinei Guimarães", "Matheus Costa", "Juenisson Belem", "Cezar Prado", "Ezequiel Silva", "Lucas Anjos"];
    let equipeSelecionada = [];

    if (localStorage.getItem('tecnicos_v12')) {
        colaboradores = JSON.parse(localStorage.getItem('tecnicos_v12'));
    }

    function atualizarSelect() {
        const select = document.getElementById('selectColaboradores');
        select.innerHTML = '<option value="">Selecione para adicionar...</option>';
        colaboradores.sort().forEach(nome => {
            const isSelected = equipeSelecionada.includes(nome);
            select.innerHTML += `<option value="${nome}" ${isSelected ? 'disabled' : ''}>${nome} ${isSelected ? '✔' : ''}</option>`;
        });
        renderizarListaAdmin();
    }

    function renderizarListaAdmin() {
        const list = document.getElementById('listaAdminColaboradores');
        list.innerHTML = '';
        colaboradores.sort().forEach(nome => {
            list.innerHTML += `<div class="colab-item"><span>${nome}</span><button class="btn-del" onclick="excluirColaborador('${nome}')">Remover</button></div>`;
        });
    }

    function toggleModal(show) { document.getElementById('modalEquipe').style.display = show ? 'flex' : 'none'; }

    function adicionarColaborador() {
        const select = document.getElementById('selectColaboradores');
        const nome = select.value;
        if (nome && !equipeSelecionada.includes(nome)) {
            equipeSelecionada.push(nome);
            renderBadges();
            atualizarSelect();
        }
        select.value = "";
    }

    function removerBadge(nome) {
        equipeSelecionada = equipeSelecionada.filter(n => n !== nome);
        renderBadges();
        atualizarSelect();
    }

    function renderBadges() {
        const container = document.getElementById('badgesEquipe');
        container.innerHTML = '';
        equipeSelecionada.forEach(nome => {
            container.innerHTML += `<div class="badge">${nome}<span onclick="removerBadge('${nome}')">&times;</span></div>`;
        });
    }

    function addNovoColab() {
        const n = document.getElementById('novoNome').value.trim();
        if (n) { 
            colaboradores.push(n); 
            localStorage.setItem('tecnicos_v12', JSON.stringify(colaboradores)); 
            atualizarSelect(); 
            document.getElementById('novoNome').value = ''; 
        }
    }

    function excluirColaborador(nome) {
        if(confirm(`Remover ${nome}?`)) {
            colaboradores = colaboradores.filter(n => n !== nome);
            localStorage.setItem('tecnicos_v12', JSON.stringify(colaboradores));
            atualizarSelect();
        }
    }

    function atualizarDataHora() {
        const agora = new Date();
        document.getElementById('data_auto').value = agora.toLocaleDateString('pt-BR');
        document.getElementById('hora_auto').value = agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
    }

    function enviarWhatsApp() {
        const form = document.getElementById('cftvForm');
        if (equipeSelecionada.length === 0) { alert("Adicione pelo menos um técnico!"); return; }
        if (!form.checkValidity()) { form.reportValidity(); return; }

        const d = {
            atividade: document.getElementById('atividade').value,
            data: document.getElementById('data_auto').value,
            hora: document.getElementById('hora_auto').value,
            // Converte para maiúsculo apenas no envio para padronizar o relatório
            chamado: document.getElementById('chamado').value.toUpperCase(),
            equipe: equipeSelecionada.join('%0A'), 
            site: document.getElementById('site').value,
            local: document.getElementById('local').value,
            status: document.getElementById('status').value,
            obs: document.getElementById('comentarios').value
        };

        const sep = "----------------------------------------";

        const mensagem = `*RELATÓRIO DE MANUTENÇÃO CFTV*%0A` +
            `${sep}%0A%0A` +
            `*Atividade:*%0A${d.atividade}%0A` +
            `${sep}%0A` +
            `*Data:*%0A${d.data}%0A` +
            `${sep}%0A` +
            `*Hora:*%0A${d.hora}%0A` +
            `${sep}%0A` +
            `*Nº Chamado:*%0A${d.chamado}%0A` +
            `${sep}%0A` +
            `*Colaboradores:*%0A${d.equipe}%0A` +
            `${sep}%0A` +
            `*Site:*%0A${d.site}%0A` +
            `${sep}%0A` +
            `*Local:*%0A${d.local}%0A` +
            `${sep}%0A` +
            `*Status:*%0A${d.status}%0A` +
            `${sep}%0A` +
            `*Comentários:*%0A${d.obs}%0A` +
            `${sep}`;

        window.open(`https://api.whatsapp.com/send?text=${mensagem}`, '_blank');
        
        setTimeout(() => {
            form.reset();
            equipeSelecionada = [];
            renderBadges();
            atualizarSelect();
            atualizarDataHora();
        }, 1000);
    }

    window.onload = function() {
        atualizarDataHora();
        atualizarSelect();
    };
</script>
</body>
</html>
