<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manutenção CFTV - Telejur</title>
    <style>
        :root { --primary: #25d366; --danger: #dc3545; --bg: #f4f7f6; --text: #333; --disabled: #ccc; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .container { max-width: 500px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin: auto; }
        h2 { color: #128c7e; text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; background: #fff; }
        input:invalid { border-color: var(--danger); }
        .equipe-badge-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; min-height: 20px; }
        .badge { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; display: flex; align-items: center; font-weight: 500; }
        .badge span { margin-left: 10px; cursor: pointer; font-weight: bold; color: var(--danger); font-size: 1.1rem; }
        .btn-whatsapp { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .admin-section { margin-top: 25px; border-top: 2px dashed #ccc; padding-top: 15px; display: none; }
        .admin-list-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .btn-admin-toggle { background: none; color: #999; font-size: 0.7rem; border: none; width: auto; margin: 20px auto 0; display: block; text-decoration: underline; cursor: pointer; }
        option:disabled { color: var(--disabled); background-color: #f0f0f0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Manutenção CFTV</h2>
    
    <form id="cftvForm">
        <div class="form-group">
            <label>Atividade:</label>
            <input type="text" id="atividade" placeholder="Ex: Ajuste de Câmeras" required>
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex:1">
                <label>Data:</label>
                <input type="text" id="data_auto" readonly required>
            </div>
            <div class="form-group" style="flex:1">
                <label>Hora:</label>
                <input type="text" id="hora_auto" readonly required>
            </div>
        </div>

        <div class="form-group">
            <label>Nº Chamado (INC ou SCTASK + 7 dígitos):</label>
            <input type="text" id="chamado" placeholder="Ex: INC1234567" 
                   pattern="^(INC\d{7}|SCTASK\d{7})$" 
                   title="Inicie com INC ou SCTASK + 7 números." required>
        </div>

        <div class="form-group">
            <label>Colaboradores (Mínimo 1):</label>
            <select id="selectColaboradores" onchange="adicionarColaborador()">
                <option value="">Selecione um nome...</option>
            </select>
            <div class="equipe-badge-container" id="badgesEquipe"></div>
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex:1">
                <label>Site:</label>
                <select id="site" required>
                    <option value="">Selecione...</option>
                    <option value="JPO">JPO</option>
                    <option value="JBE">JBE</option>
                </select>
            </div>
            <div class="form-group" style="flex:1">
                <label>Local:</label>
                <input type="text" id="local" placeholder="Ex: Portaria" required>
            </div>
        </div>

        <div class="form-group">
            <label>Utilização do SkyMunck:</label>
            <select id="skymunck" required>
                <option value="Não Utilizado">Não Utilizado</option>
                <option value="Utilizado">Utilizado</option>
            </select>
        </div>

        <div class="form-group">
            <label>Status:</label>
            <select id="status" required>
                <option value="">Selecione...</option>
                <option value="Concluído">✅ Concluído</option>
                <option value="Pendente">⚠️ Pendente</option>
                <option value="Em Andamento">⏳ Em Andamento</option>
            </select>
        </div>

        <div class="form-group">
            <label>Comentários:</label>
            <textarea id="comentarios" rows="3" placeholder="Detalhes técnicos..." required></textarea>
        </div>

        <button type="button" class="btn-whatsapp" onclick="enviarWhatsApp()">
            Enviar para WhatsApp
        </button>
    </form>

    <button class="btn-admin-toggle" onclick="toggleAdmin()">⚙️ Gerenciar Equipe</button>

    <div class="admin-section" id="adminPanel">
        <label>Novo Colaborador:</label>
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <input type="text" id="novoNome">
            <button onclick="addNovoColab()" style="padding: 10px; width: 60px;">OK</button>
        </div>
        <div id="listaAdminColaboradores"></div>
        <button onclick="toggleAdmin()" style="background:#666; margin-top: 10px;">Fechar</button>
    </div>
</div>

<script>
    let colaboradores = ["Edenildo Rodrigues", "Joelcinei Guimarães", "Matheus Costa", "Juenisson Belem", "Cezar Prado", "Ezequiel Silva", "Lucas Anjos"];
    let equipeSelecionada = [];

    if (localStorage.getItem('tecnicos_v7')) {
        colaboradores = JSON.parse(localStorage.getItem('tecnicos_v7'));
    }

    function atualizarSelect() {
        const select = document.getElementById('selectColaboradores');
        select.innerHTML = '<option value="">Selecione um nome...</option>';
        colaboradores.sort().forEach(nome => {
            const isSelected = equipeSelecionada.includes(nome);
            const disabledAttr = isSelected ? 'disabled' : '';
            select.innerHTML += `<option value="${nome}" ${disabledAttr}>${nome} ${isSelected ? '(Selecionado)' : ''}</option>`;
        });
        renderizarListaAdmin();
    }

    function renderizarListaAdmin() {
        const list = document.getElementById('listaAdminColaboradores');
        list.innerHTML = '';
        colaboradores.sort().forEach(nome => {
            list.innerHTML += `<div class="admin-list-item">${nome} <span style="color:red; cursor:pointer" onclick="excluirColaborador('${nome}')">Excluir</span></div>`;
        });
    }

    function adicionarColaborador() {
        const select = document.getElementById('selectColaboradores');
        const nome = select.value;
        if (nome && !equipeSelecionada.includes(nome)) {
            equipeSelecionada.push(nome);
            renderBadges();
            atualizarSelect();
        }
        select.value = "";
    }

    function removerBadge(nome) {
        equipeSelecionada = equipeSelecionada.filter(n => n !== nome);
        renderBadges();
        atualizarSelect();
    }

    function renderBadges() {
        const container = document.getElementById('badgesEquipe');
        container.innerHTML = '';
        equipeSelecionada.forEach(nome => {
            container.innerHTML += `<div class="badge">${nome}<span onclick="removerBadge('${nome}')">×</span></div>`;
        });
    }

    function addNovoColab() {
        const n = document.getElementById('novoNome').value.trim();
        if (n) { 
            colaboradores.push(n); 
            localStorage.setItem('tecnicos_v7', JSON.stringify(colaboradores)); 
            atualizarSelect(); 
            document.getElementById('novoNome').value = ''; 
        }
    }

    function excluirColaborador(nome) {
        colaboradores = colaboradores.filter(n => n !== nome);
        localStorage.setItem('tecnicos_v7', JSON.stringify(colaboradores));
        atualizarSelect();
    }

    function toggleAdmin() {
        const p = document.getElementById('adminPanel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function atualizarDataHora() {
        const agora = new Date();
        document.getElementById('data_auto').value = agora.toLocaleDateString('pt-BR');
        document.getElementById('hora_auto').value = agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
    }

    function enviarWhatsApp() {
        const form = document.getElementById('cftvForm');
        
        if (equipeSelecionada.length === 0) {
            alert("Selecione pelo menos um colaborador!");
            return;
        }

        if (!form.checkValidity()) {
            form.reportValidity();
            return;
        }

        const dados = {
            atividade: document.getElementById('atividade').value,
            data: document.getElementById('data_auto').value,
            hora: document.getElementById('hora_auto').value,
            chamado: document.getElementById('chamado').value,
            equipe: equipeSelecionada.join(', '),
            site: document.getElementById('site').value,
            local: document.getElementById('local').value,
            skymunck: document.getElementById('skymunck').value,
            status: document.getElementById('status').value,
            obs: document.getElementById('comentarios').value
        };

        // Formatação WhatsApp: Título sublinhado com traços e espaçamento duplo entre campos
        const mensagem = `*RELATÓRIO DE MANUTENÇÃO CFTV*%0A` +
            `----------------------------------------%0A%0A` +
            `*Atividade:*%0A${dados.atividade}%0A%0A` +
            `*Data:*%0A${dados.data}%0A%0A` +
            `*Hora:*%0A${dados.hora}%0A%0A` +
            `*Nº Chamado:*%0A${dados.chamado}%0A%0A` +
            `*Colaboradores:*%0A${dados.equipe}%0A%0A` +
            `*Site:*%0A${dados.site}%0A%0A` +
            `*Local:*%0A${dados.local}%0A%0A` +
            `*SkyMunck:*%0A${dados.skymunck}%0A%0A` +
            `*Status:*%0A${dados.status}%0A%0A` +
            `*Comentários:*%0A${dados.obs}`;

        window.open(`https://api.whatsapp.com/send?text=${mensagem}`, '_blank');
        
        setTimeout(() => {
            form.reset();
            equipeSelecionada = [];
            renderBadges();
            atualizarSelect();
            atualizarDataHora();
        }, 1000);
    }

    window.onload = function() {
        atualizarDataHora();
        atualizarSelect();
    };
</script>
</body>
</html>
