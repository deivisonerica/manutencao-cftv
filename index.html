<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Relatório Técnico - Telejur</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f8f9fa;
            --text-color: #333;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            margin: 0;
            padding: 15px;
        }

        .container { 
            max-width: 600px; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            margin: auto; 
        }

        h2 { 
            text-align: center; 
            color: var(--primary-color); 
            font-size: 1.4rem;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
        }

        .form-group { margin-bottom: 15px; }

        label { 
            display: block; 
            margin-bottom: 5px; 
            font-weight: 600; 
            font-size: 0.9rem;
        }

        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            font-size: 16px; /* Evita zoom automático no iOS */
            box-sizing: border-box; 
            background-color: #fff;
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 5px rgba(0,86,179,0.2);
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row > div { flex: 1; }

        button { 
            background-color: var(--primary-color); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 1.1rem; 
            font-weight: bold;
            margin-top: 10px;
            -webkit-tap-highlight-color: transparent;
        }

        button:active { transform: scale(0.98); background-color: #004494; }

        /* Estilo para Checklist mobile */
        .checklist {
            background: #f1f1f1;
            padding: 10px;
            border-radius: 8px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Manutenção e Atividades</h2>
    
    <form action="https://formspree.io/f/seu-id-aqui" method="POST">
        
        <div class="form-group">
            <label>Atividade:</label>
            <input type="text" name="atividade" placeholder="Ex: Manutenção CFTV" required>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Data:</label>
                <input type="date" name="data" required>
            </div>
            <div class="form-group">
                <label>Nº Chamado:</label>
                <input type="text" name="chamado" placeholder="0000/2026">
            </div>
        </div>

        <div class="form-group">
            <label>Colaboradores:</label>
            <input type="text" name="colaboradores" placeholder="Nomes da equipe">
        </div>

        <div class="row">
            <div class="form-group">
                <label>Site:</label>
                <input type="text" name="site" placeholder="Unidade/Empresa">
            </div>
            <div class="form-group">
                <label>Local:</label>
                <input type="text" name="local" placeholder="Setor/Galpão">
            </div>
        </div>

        <div class="form-group">
            <label>Utilização do SkyMunck:</label>
            <select name="skymunck">
                <option value="nao">Não Utilizado</option>
                <option value="sim">Sim - Operacional</option>
                <option value="sim_problema">Sim - Com Ressalvas</option>
            </select>
        </div>

        <div class="form-group">
            <label>Status Final:</label>
            <select name="status">
                <option value="concluido">✅ Concluído</option>
                <option value="pendente">⚠️ Pendente</option>
                <option value="em_andamento">⏳ Em Andamento</option>
                <option value="impedimento">❌ Com Impedimento</option>
            </select>
        </div>

        <div class="form-group">
            <label>Observações Adicionais:</label>
            <textarea name="obs" rows="3" placeholder="Detalhes técnicos relevantes..."></textarea>
        </div>

        <button type="submit">Enviar Relatório</button>
    </form>
</div>

</body>
</html>
